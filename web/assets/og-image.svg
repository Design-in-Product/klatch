<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a1628"/>

  <!-- Subtle grid/texture line -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#16213e" stroke-width="1"/>

  <!-- K logo — centered, scaled up -->
  <g transform="translate(488, 160) scale(3.5)">
    <rect x="10" y="8" width="8.5" height="48" rx="4.25" ry="4.25" fill="#e5e7eb"/>
    <rect x="18.5" y="28" width="24" height="8" rx="4" ry="4" fill="#e5e7eb" transform="rotate(-40, 18.5, 32)"/>
    <rect x="18.5" y="28" width="26" height="8" rx="4" ry="4" fill="#e5e7eb" transform="rotate(40, 18.5, 32)"/>
    <circle cx="50.5" cy="12" r="5" fill="#EF4444"/>
  </g>

  <!-- "klatch" wordmark -->
  <text x="600" y="430" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="72" font-weight="800" letter-spacing="-2" fill="#f3f4f6">
    klatch
  </text>

  <!-- Tagline -->
  <text x="600" y="480" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="24" font-weight="400" fill="#6b7280">
    Own your Claude conversations.
  </text>
</svg>
