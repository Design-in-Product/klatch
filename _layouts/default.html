<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  {% seo %}

      padding: 24px;
      line-height: 1.6;
      color: #d1d5db;

    a { color: #818cf8; }
    code { background: #16213e; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }

    table { border-collapse: collapse; width: 100%; }

    img { max-width: 100%; }
