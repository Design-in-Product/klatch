<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!--
    Klatch "K-Channel" Logo — Clean Variant
    Purer K construction: the diagonal strokes of the K are rendered
    as two angled bars that meet at the vertical spine's midpoint,
    giving a stronger letter-K read while retaining the channel/sidebar feel.
  -->

  <!-- Vertical bar (K spine) -->
  <rect x="12" y="8" width="8" height="48" rx="4" ry="4" fill="currentColor"/>

  <!-- Upper diagonal arm — angled bar going up-right from midpoint -->
  <rect
    x="20" y="28"
    width="26" height="7"
    rx="3.5" ry="3.5"
    fill="currentColor"
    transform="rotate(-38, 20, 31.5)"
  />

  <!-- Lower diagonal arm — angled bar going down-right from midpoint -->
  <rect
    x="20" y="28"
    width="28" height="7"
    rx="3.5" ry="3.5"
    fill="currentColor"
    transform="rotate(38, 20, 31.5)"
  />

  <!-- Notification dot -->
  <circle cx="51" cy="12" r="4.5" fill="#EF4444"/>
</svg>
